<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout Card</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: Arial, sans-serif;
}

/* Card Design */
.logout-card{
    width:300px;
    padding:30px;
    text-align:center;
    border-radius:20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: 0.4s ease;
    color:white;
}

.logout-card:hover{
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

/* Heading */
.logout-card h2{
    margin-bottom:10px;
    letter-spacing:1px;
}

/* Description */
.logout-card p{
    font-size:14px;
    opacity:0.8;
    margin-bottom:25px;
}

/* Logout Button */
.logout-btn{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s ease;
}

.logout-btn:hover{
    transform: scale(1.1);
    box-shadow: 0 0 15px #ff4b2b;
}
</style>

</head>
<body>

<div class="logout-card">
    <h2>Welcome Back 👋</h2>
    <p>You are currently logged in. Click below to logout safely.</p>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script>
function logout(){
    alert("Logged Out Successfully!");
    window.location.href = "index.html";
}
</script>

</body>
</html>
